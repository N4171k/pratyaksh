<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Colors -->
  <defs>
    <style>
      .stroke {
        fill: none;
        stroke: #ffffff;
        stroke-width: 18;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .text {
        fill: #ffffff;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 48px;
        letter-spacing: 6px;
        font-weight: 600;
      }
    </style>
  </defs>

  <!-- Concentric circles -->
  <circle cx="250" cy="220" r="120" class="stroke"/>
  <circle cx="250" cy="220" r="85" class="stroke"/>
  <circle cx="250" cy="220" r="50" class="stroke"/>

  <!-- Magnifying glass handle -->
  <line x1="315" y1="285" x2="380" y2="350" class="stroke"/>

  <!-- Text -->
  <text x="250" y="440" text-anchor="middle" class="text">
    PRATYAKSH
  </text>
</svg>
